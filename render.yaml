# Render.com blueprint. Deploys the Dockerized Next.js app connected to an
# external PostgreSQL database (Supabase) via DATABASE_URL. Data persists
# across redeploys. Set the secret env vars (DATABASE_URL, DIRECT_URL,
# AUTH_SECRET, NEXTAUTH_URL) in the Render dashboard or via the API.

services:
  - type: web
    name: nestmate-apartment-finder
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      # Pooled (transaction) Postgres connection used by the running app.
      - key: DATABASE_URL
        sync: false
      # Direct (session) Postgres connection used for migrations.
      - key: DIRECT_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RENTCAST_API_KEY
        sync: false
