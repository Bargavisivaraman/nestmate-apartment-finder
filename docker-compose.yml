# Runs the app against your PostgreSQL database. Provide connection details and
# secrets via a .env file or the shell environment, then `docker compose up`.

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      DIRECT_URL: "${DIRECT_URL:-${DATABASE_URL}}"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production-please-generate-a-real-secret}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      RENTCAST_API_KEY: "${RENTCAST_API_KEY:-}"
    restart: unless-stopped

  # Optional local PostgreSQL for fully offline development. Enable with:
  #   docker compose --profile local-db up
  # then set DATABASE_URL/DIRECT_URL to:
  #   postgresql://nestmate:nestmate@localhost:5432/apartment_finder
  db:
    image: postgres:16-alpine
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: nestmate
      POSTGRES_PASSWORD: nestmate
      POSTGRES_DB: apartment_finder
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg-data:
