# Render.com blueprint. Deploys the Dockerized Next.js app. The Docker image
# bakes in a pre-seeded SQLite database at build time, so it runs on the free
# tier with no persistent disk or external database (demo data resets on each
# redeploy). For durable data, switch to PostgreSQL — see the README
# "Switching to PostgreSQL" and add a `databases:` block.

services:
  - type: web
    name: nestmate-apartment-finder
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        value: file:/app/prisma/prod.db
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
